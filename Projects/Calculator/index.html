<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />

  <body>

    <img src="./image.png" alt="img" class="position-relative w-100 vh-100">


    <div id="box" class="position-absolute top-0 mt-lg-5">


        <div id="screen" class=" border  rounded-top-5" >
           <label for="text" class="fs-5 w-100   " id="text">0</label>
        </div>
        <br>
         <div id="pad" class="border rounded-bottom-5">

          
         <button id="button" class=" btn bg-light shadow " onclick="Calculate('AC')"> AC </button> 
         <button id="button" class="btn bg-light shadow "onclick="Calculate('C')"> C </button>
         <button id="button" class="btn bg-light shadow"onclick="Calculate('%')"> % </button>
         <button id="button" class="btn bg-light shadow"onclick="Calculate('/')"> / </button>
         <button id="button" class="btn bg-light shadow"onclick="Calculate('7')"> 7 </button>
         <button id="button" class="btn bg-light shadow"onclick="Calculate('8')"> 8 </button>
         <button id="button" class="btn bg-light shadow"onclick="Calculate('9')"> 9 </button>
         <button id="button" class="btn bg-light shadow"onclick="Calculate('*')"> * </button>
         <button id="button" class="btn bg-light shadow"onclick="Calculate('4')"> 4 </button>
         <button id="button" class="btn bg-light shadow"onclick="Calculate('5')"> 5 </button>
         <button id="button" class="btn bg-light shadow" onclick="Calculate('6')"> 6 </button>
         <button id="button" class="btn bg-light shadow" onclick="Calculate('-')"> - </button>
         <button id="button" class="btn bg-light shadow" onclick="Calculate('1')"> 1 </button>
         <button id="button" class="btn bg-light shadow" onclick="Calculate('2')"> 2 </button>
         <button id="button" class="btn bg-light shadow" onclick="Calculate('3')"> 3 </button>
         <button id="button" class="btn bg-light shadow" onclick="Calculate('+')"> + </button>
         <button id="button" class="btn bg-light shadow" onclick="Calculate('0')"> 0 </button>
         <button id="button" class="btn bg-light shadow" onclick="Calculate('.')"> . </button>
         
         

         <button   id="button2" class="bg-success rounded-pill w-100 border-0">=</button>

        </div>

    </div>













    <script src="script.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
