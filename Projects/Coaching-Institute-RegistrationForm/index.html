<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Form</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />

    <link
      rel="stylesheet"
      href=" https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header>
      <div
        class="container border text-center text-white py-3 mt-2 w-50 rounded-5 bg-secondary"
      >
        <h3>Registration Form</h3>
      </div>

      <br />
    </header>
    <main>
      <form class="container rounded-3 shadow mb-5" class="registartionForm">
        <section>
          <div class="p-3">
            <h6 class="fw-bold text-decoration-underline">
              PERSONAL INFORMATION :-
            </h6>

            <div class="border rounded-4 p-4">
              <label for="text" class="pt-3 fw-bold"> <h7>Full Name</h7></label>
              <input
                type="text"
                name="fullName"
                id="fullName"
                placeholder="Eneter Your Name"
                class="form-control w-100 py-2"
              />
              <span id="nameError" class="error"></span>


              
              <label for="text" class="pt-3 fw-bold"> <h7>Email </h7></label>
              <input
                type="email"
                name="email"
                id="email"
                placeholder="Eneter Your Email"
                class="form-control w-100 py-2"
              />
              <span id="emailError" class="error"></span>

              <div class="d-flex gap-lg-5">
                <div class="w-50">
                  <label for="number" class="pt-3 fw-bold">
                    <h7>Contact No. </h7></label
                  >

                  <input
                    type="number"
                    name="number"
                    id="phone"
                    placeholder="Eneter Your phone number"
                    class="form-control w-100"
                  />
                  <span id="phoneError" class="error"></span>
                </div>

                <div class="w-50">
                  <label for="date" class="pt-3 fw-bold"> <h7>DOB </h7></label>

                  <input
                    type="date"
                    name="date"
                    id="DOB"
                    placeholder="Eneter Your Birth Date"
                    class="form-control w-100"
                  />
                  <span id="dateError" class="error"></span>
                </div>
              </div>
               
           <div class="p-2 mt-2 d-flex gap-5">
              <label for="gender" class="form-label fw-bold">Gender</label>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="male"
                  value="male"
                  class="form-switch"
                />
                <span>Male</span>
              </div>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="female"
                  value="female"
                  class="form-switch"
                />
                <span>Female</span>
              </div>
              <div>
                <input
                  type="radio"
                  name="gender"
                  id="others"
                  value="others"
                  class="form-switch"
                />
                <span>Others</span>
              </div>
              <span class="text-danger small" id="dobError"></span>
            </div>
        
            </div>
          </div>
        </section>

        <section>
          <div class="p-3">
            <h6 class="text-decoration-underline fw-bold">
              ACADEMIC DETAIL :-
            </h6>

            <div class="border rounded-4 p-4">
              <div class="d-flex gap-lg-5">
                <div class="w-50">
                  <h7 class="pt-3 fw-bold">Qualification</h7>

                  <select
                    type="qualification"
                    name="qualification"
                    id="qualification"
                   
                    class="form-control w-100"
                  >
                    <option value="select">select Your Qualification</option>
                    <option value="10">10-pass</option>
                    <option value="12">12-pass</option>
                    <option value="Graduate">Graduate</option>
                    <option value="Post Graduate">Poat-Graduate</option>
                  </select>

                  <span id="qualificationError" class="error"></span>
                </div>

                
                <div class="  w-50">
              <label for="marks" class="form-label  fw-bold"
                >Percentage/Grade</label
              >
              <input
                type="text"
                name="marks"
                id="marks"
                class="form-control "
                placeholder="90% or A-F"
              />
              <span class="text-danger small manualError" id="marksError"></span>
            </div>
                  
              </div>
            </div>
          </div>
        </section>

       

          

          <section class="bg-white p-3 rounded border m-3 rounded-4 mb-3">
            <div class="p-2 mt-2">
              <label for="course" class="form-label fw-bold"
                >Preferred Course</label
              >
              <select name="course" id="course" class="form-select">
                <option value="">Select Course</option>
                <option value="iitJee">IIT-JEE</option>
                <option value="neet">NEET</option>
                <option value="bankingExams">Banking Exams</option>
                <option value="ca/cs">CA/CS</option>
                <option value="upsc">UPSC</option>
              </select>
              <span class="text-danger small" id="courseError"></span>
            </div>
            <div class="p-2 mt-2 d-flex gap-5 align-items-center">
              <label for="timings" class="form-label fw-bold"
                >Batch Timing Preference</label
              >
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="morning"
                  value="morning"
                  class="form-check"
                />
                <span>Morning</span>
              </div>
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="evening"
                  value="evening"
                  class="form-check"
                />
                <span>Evening</span>
              </div>
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="afternoon"
                  value="afternoon"
                  class="form-check"
                />
                <span>AfterNoon</span>
              </div>
              <div class="d-flex gap-2">
                <input
                  type="checkbox"
                  name="timings"
                  id="weekends"
                  value="weekends"
                  class="form-check"
                />
                <span>Weekends</span>
              </div>
              <span class="text-danger small" id="timingsError"></span>
            </div>
          </section>

          <section class="bg-white p-3 rounded border m-3 rounded-4 mb-3">
            <div class="p-2 mt-2">
              <label for="address" class="form-label fw-bold">Address</label>
              <textarea
                name="address"
                id="address"
                class="form-control"
                placeholder="123, Main Street"
              ></textarea>
              <span class="text-danger small" id="addressError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="city" class="form-label fw-bold">City</label>
              <input
                type="text"
                name="city"
                id="city"
                class="form-control"
                placeholder="Delhi"
              />
              <span class="text-danger small" id="cityError"></span>
            </div>
            <div class="p-2 mt-2">
              <label for="pin" class="form-label fw-bold">Pin Code</label>
              <input
                type="text"
                name="pin"
                id="pin"
                class="form-control"
                placeholder="110001"
              />
              <span class="text-danger small" id="pinError"></span>
            </div>
          </section>

          <div class="d-flex justify-content-center gap-4">
            <button type="reset" class="btn btn-secondary mb-3">Clear</button>
            <button type="submit" class="btn btn-primary mb-3 ">Submit</button>
          </div>
        </section>
      </form>
    </main>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script.js"></script>
  </body>
</html>
