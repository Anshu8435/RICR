<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-primary">
    <div class="mt-lg-5">
      <h3 class="rounded-top-5">TIP CALCULATOR</h3>
      <form class="form-control p-4" id="form">
        <label for="Billamount">Bill Amount</label>
        <br />
        <input
          type="number"
          name="Billamount"
          id="Billamount"
          class="form-control"
          placeholder="Amount to be Paid"
        />
        <br />
        <label for="Service">How was the service?</label>

        <select name="Tip" id="tip" class="form-control">
          <option>select</option>
          <option value="25">25% - Top Notch</option>
          <option value="20">20% - Excellent</option>
          <option value="10">15% - Good</option>
          <option value="20">10% - Bad</option>
          <option value="5">5% - Worst</option>
        </select>

        <br />

        <label for="person">Total number of persons </label> <br />
        <input
          type="number"
          name="persons"
          id="person"
          class="form-control"
          placeholder="Number of peoples sharing the Bill"
        />
        <br />

        <button class="btn btn-primary" id="Submit">Calculate</button>
        <div class="fw-bold text-center">
          Tip Amount : <br />
          <span id="MyTip">XX</span> Each
        </div>
      </form>
    </div>

     <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="script1.js"></script>
  </body>
</html>
