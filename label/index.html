<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form</title>
  </head>
  <body>
    <form>
      <label for=" fullName">Full Name</label>
      <input type="text" id=" fullName" placeholder="Enter Name" /><br /><br />

      <label for="email"> Email:</label>
      <input type="email" id="email" placeholder="Enter Your Email" />
      <br /><br />

      <label for="password">Password</label>
      <input type="password" id="password" /><br /><br />

      <label for="age"> Age</label>
      <input type="number" id="age" placeholder="18" />
      <br /><br />

      <label for="birthdate"> Date of Birth</label>
      <input type="date" id="birthdate" /> <br />
      <br />

      <label for="time">Time:</label>
      <input type="time" id="time" /> <br /><br />

      <label for="datetime"> Date & Time</label>
      <input type="datetime-local" id="datetime" /> <br /><br />

      <label for="range">Range</label>
      <input type="range" id="range" /> <br /><br />

      <label for="color">Colour</label>
      <input type="color" id="color" />
      <br /><br />

      <label for="website">Website:</label>
      <input type="url" id="url" />

      <br /><br />
      <input type="submit" Submit />
    </form>

    <form>
      <label for="city">Select City</label>
      <select id="city" placeholder=" select">
        <option value=""></option>
        <option value="delhi">Delhi</option>
        <option value="mumbai">Mumbai</option>
        <option value="bhopal">bhopal</option>
      </select>

      <br /><br />

      <label for="message"> Message:</label>
      <br />

      <textarea id="message" rows="10" cols="20"></textarea>
    </form>
    <br />
    <br /><br />
    <form>

      <label for="file"> Upload Resume</label>
      <input type="file" id="file" accept=".jpg,.png
      " /> 
      
    

      <input type="file" multiple>
      
      <br /><br />





<button type="button"> Button </button>
<button type="submit">Submit</button>
<button type="reset">Reset</button>
      
    </form>
  </body>
</html>
