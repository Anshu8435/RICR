<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task03</title>
</head>
<body>
    
    <form>
      <label for=" fullName">Full Name</label>
      <input type="text" id=" fullName" placeholder="Enter Name" /><br /><br />

      <label for="email"> Email:</label>
      <input type="email" id="email" placeholder="Enter Your Email" />
      <br /><br />

      <label for="password">Password</label>
      <input type="password" id="password" /><br /><br />

      <label for="age"> Age</label>
      <input type="number" id="age" placeholder="18" />
      <br /><br />

      <label for="birthdate"> Date of Birth</label>
      <input type="date" id="birthdate" /> <br />
      <br />

      <label for="time">Time:</label>
      <input type="time" id="time" /> <br /><br />

      <label for="datetime"> Date & Time</label>
      <input type="datetime-local" id="datetime" /> <br /><br />

      <label for="range">Range</label>
      <input type="range" id="range" /> <br /><br />

      <label for="color">Colour</label>
      <input type="color" id="color" />
      <br /><br />

      <label for="website">Website:</label>
      <input type="url" id="url" />

      <br /><br />
      <input type="submit" Submit />
    </form>
</body>
</html>
