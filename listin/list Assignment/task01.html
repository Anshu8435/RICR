<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>listin</title>
  </head>
  <body>

    <h2>Disc bullets list:-</h2>

    <ul>
      <li>Appeles</li>
      <li>bananas</li>
      <li>lemons</li>
      <li>Oranges</li>
    </ul>

    <hr />
    <br />

    <h2>Circle bullets list:-</h2>

    <ul type="circle">
      <li>Apples</li>
      <li>bananas</li>
      <li>Oranges</li>
      <li>lemons</li>
    </ul>

    <hr />
    <br />

    <h2>Square bullets:-</h2>

    <ul type="square">
      <li>Apples</li>
      <li>bananas</li>
      <li>lemons</li>
      <li>oranges</li>
    </ul>


  </body>
</html>
